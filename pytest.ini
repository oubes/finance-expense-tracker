[pytest]

# Test path and discovery
testpaths = tests

# Naming conventions
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output + behavior
addopts =
    -v
    --strict-markers
    --disable-warnings
    --color=yes
    --tb=short

# Markers
markers =
    unit: Unit tests for isolated components
    integration: Integration tests between layers (api + services + db)
    api: API endpoint tests (FastAPI)
    rag: RAG pipeline tests (retrieval + generation)
    finance: Finance domain logic tests
    slow: Tests that take longer to run

# Logging
log_cli = true
log_cli_level = INFO

# Cache
cache_dir = .pytest_cache