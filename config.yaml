# LLM Configuration
llm:
  provider: "alibaba"
  base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
  model: "qwen2.5-vl-72b-instruct"
  temperature: 0.2
  max_tokens: 1024
  max_retries: 3
  base_delay: 0.5
  max_context_tokens: 4096

# Data Configuration
data:
  raw_data_dir: "data/raw"

# Embeddings
embeddings:
  model: "text-embedding-v3"
  dimension: 1024

ingestion:
  chunk_size: 500
  chunk_overlap: 50
  prompt_templates_dir: "src/modules/prompts/templates"
  doc_name: "Ai System Design Competition.pdf"
  score_filter_threshold: 0.5

# RAG Settings
rag:
  top_k_retrieval: 5
  top_k_rerank: 3
  cross_encoder_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  reranker_weights:
    bm25: 0.3
    vector: 0.5
    chunk_score: 0.2
    cross_encoder: 0.2

# Vector DB
vector_db:
  enabled: true
  type: "postgresql"
  name: "finance_db"
  table: "documents_embeddings"

# Rate Limiting
rate_limit:
  requests: 100
  window_seconds: 60

# Observability
observability:
  metrics_enabled: true
  tracing_enabled: true
  otel_exporter_endpoint: "http://localhost:4317"